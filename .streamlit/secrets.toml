# Streamlit Cloud Secrets
# These are used by the Prism app when running on Streamlit Cloud
# Users can add their own keys via the Streamlit Cloud dashboard

# OpenAI API Key - REQUIRED for agent functionality
# Add via Streamlit Cloud dashboard: Settings > Secrets > OPENAI_API_KEY
OPENAI_API_KEY = "sk-placeholder"

# Discord Bot Token - optional for Discord integration
DISCORD_TOKEN = "placeholder"

# Slack Bot Token - optional for Slack integration
SLACK_TOKEN = "placeholder"

# Database path (handled automatically by app)
DATABASE_URL = "sqlite:///specflow.db"
